<script>
(function(){
  fetch('$XYMONSERVERCGIURL/ghostlist.sh?TEXT')
    .then(function(r){ return r.text(); })
    .then(function(t){
      var n = t.trim().split('\n').filter(function(l){ return l.trim().length > 0; }).length;
      if (n > 0) {
        var b = document.getElementById('xymon-ghost-badge');
        if (b) { b.textContent = n; b.classList.remove('d-none'); }
      }
    })
    .catch(function(){});
})();
</script>
